<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tickets | AWS Community Day DevOps Edition 2026</title>
  <meta name="description"
    content="Get your tickets for AWS Community Day DevOps Edition 2026. Choose from Super Early Bird, Workshop, or Golden Ticket passes." />
  <link rel="icon" href="/assets/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <header id="site-header"></header>
  <main>
    <section class="page-hero">
      <div class="container">
        <h1>Get Your Tickets</h1>
        <p>Choose the perfect ticket tier for your AWS Community Day DevOps-Edition experience.</p>
      </div>
    </section>

    <section class="bg-white">
      <div class="container">
        <div class="tickets-grid" id="tickets-grid"></div>
      </div>
    </section>

    <section class="bg-gray">
      <div class="container" style="max-width:42rem;">
        <h2 style="text-align:center;margin-bottom:2rem;">Refund Policy</h2>
        <div class="info-card">
          <ul class="list-check">
            <li>Registration charges are non refundable and non transferable.</li>
          </ul>
        </div>
      </div>
    </section>
  </main>
  <footer id="site-footer"></footer>
  <script src="/common.js"></script>
  <script>
    const TIERS = [
      {
        id: 'super-early-bird', name: 'Super Early Bird', price: 599, currency: 'INR', desc: 'for the earliest supporters', sold: 100, limit: 10,
        includes: ['Event Swags & Goodies', 'Breakfast', 'Lunch', 'Hi-Tea', 'Full Conference Access', 'Networking Opportunities'],
        url: ' https://konfhub.com/awsugahm-acdahm2026-devops-edition', featured: false
      },
      {
        id: 'early-bird', name: 'Early Bird', price: 799, currency: 'INR', desc: 'grab your tickits early!',
        includes: ['Event Swags & Goodies', 'Breakfast', 'Lunch', 'Hi-Tea', 'Full Conference Access', 'Networking Opportunities'],
        url: ' https://konfhub.com/awsugahm-acdahm2026-devops-edition', featured: false
      },
      {
        id: 'workshop', name: 'Workshop Ticket', price: 2499, currency: 'INR', desc: 'A deeper, hands-on learning experience at AWS Community Day Ahmedabad 2026 — DevOps Edition.', sold: 0, limit: 500,
        includes: ['Event Swags & Goodies', 'Breakfast', 'Lunch', 'Hi-Tea', 'Full Conference Access', '3-Hour Hands-on Workshop with AWS Experts', 'Participation Certificate / Certifications', 'Practical Learning Sessions on AWS & DevOps Tools'],
        url: ' https://konfhub.com/awsugahm-acdahm2026-devops-edition', featured: false
      },
      {
        id: 'golden', name: 'Golden Ticket', price: 5000, currency: 'INR', desc: 'elivate your experience & support the community.', sold: 0, limit: 500,
        includes: ['Premium Swags & Exclusive Goodies', 'First Row Seating', 'Lunch at Speaker Area', 'Breakfast', 'Lunch', 'Hi-Tea', 'Full Conference Access', 'Exclusive Networking Opportunities'],
        url: ' https://konfhub.com/awsugahm-acdahm2026-devops-edition', featured: true
      },
    ];

    const grid = document.getElementById('tickets-grid');
    grid.innerHTML = TIERS.map(t => {
      const soldOut = t.sold >= t.limit;
      const priceStr = t.minPrice ? `₹${t.minPrice.toLocaleString()} – ${t.maxPrice.toLocaleString()}` : `₹${t.price.toLocaleString()}`;
      return `<div class="ticket-card ${t.featured ? 'featured' : ''}">
        ${t.featured ? '<div class="featured-badge">Most Popular</div>' : ''}
        <div class="body">
          <h3>${t.name}</h3>
          <div class="price">${priceStr}</div>
          ${t.note ? `<p style="font-size:.875rem;color:#dc2626;font-weight:500;margin-bottom:.5rem;">${t.note}</p>` : ''}
          ${soldOut
          ? '<span class="sold-out">Sold Out</span>'
          : `<a href="${t.url}" target="_blank" rel="noopener" class="buy-btn ${t.featured ? 'filled' : 'outline'}">Buy Tickets</a>`}
          
          <p class="desc" style="margin-top: 1rem; margin-bottom: 1.5rem;">${t.desc}</p>
          
          <p style="font-size:.875rem;font-weight:600;margin-bottom:.75rem;">What's Included:</p>
          <ul class="includes-list">${t.includes.map(i => `<li>${i}</li>`).join('')}</ul>
        </div>
      </div>`;
    }).join('');
  </script>
</body>

</html>
